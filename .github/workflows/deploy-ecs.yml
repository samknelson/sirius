name: Build and deploy to AWS ECS

# Builds a production Docker image, pushes it to Amazon ECR, and updates an
# existing ECS service with the new image.
#
# This workflow assumes the AWS infrastructure already exists: an ECR
# repository, an ECS cluster + service, an execution/task IAM role, and a
# secrets store (AWS Secrets Manager or SSM) referenced by
# .aws/task-definition.json. It does NOT provision infrastructure.
#
# ---------------------------------------------------------------------------
# Required GitHub configuration
#
#   Repository VARIABLES (Settings > Secrets and variables > Actions > Variables):
#     AWS_REGION          e.g. us-east-1
#     ECR_REPOSITORY      e.g. sirius
#     ECS_CLUSTER         your ECS cluster name
#     ECS_SERVICE         your ECS service name
#     ECS_CONTAINER_NAME  must match containerDefinitions[].name in the task def (default: sirius)
#
#   Repository SECRETS (Settings > Secrets and variables > Actions > Secrets):
#     AWS_ACCESS_KEY_ID        IAM user/role key with ECR + ECS deploy perms
#     AWS_SECRET_ACCESS_KEY
#     # Public client-side keys baked into the frontend bundle at build time:
#     VITE_CLERK_PUBLISHABLE_KEY
#     VITE_STRIPE_PUBLIC_KEY
#     VITE_GOOGLE_MAPS_API_KEY
#
#   Prefer OIDC over long-lived keys? Replace the credentials step with
#   `role-to-assume: <role-arn>` and add `permissions: id-token: write`.
# ---------------------------------------------------------------------------

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-ecs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      # Must match containerDefinitions[].name in .aws/task-definition.json (defaults to "sirius").
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME || 'sirius' }}
      ECS_TASK_DEFINITION: .aws/task-definition.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
            VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render new image into ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
